name: FNLLA Hardening

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    runs-on: windows-latest
    env:
      FNLLA_RUNTIME_AUTO_SYNC: false
      FNLLA_RUNTIME_ENFORCE: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql
          coverage: none

      - name: Show PHP version
        shell: pwsh
        run: php -v

      - name: Run repository tests
        shell: pwsh
        run: php .\scripts\test.php

      - name: Run syntax lint
        shell: pwsh
        run: php .\scripts\lint.php

      - name: Check documentation sync
        shell: pwsh
        run: php .\scripts\build-docs.php --check

      - name: Validate FNLLA Runtime contract
        shell: pwsh
        run: php .\scripts\validate-fnlla-runtime.php

      - name: Validate version contract
        shell: pwsh
        run: php .\scripts\validate-version-manifest.php

      - name: Validate release metadata
        shell: pwsh
        run: php .\scripts\validate-release-metadata.php

      - name: Publish runtime export
        shell: pwsh
        run: .\scripts\publish-fnlla-runtime.ps1

      - name: Verify published runtime export exists
        shell: pwsh
        run: |
          if (-not (Test-Path .\dist\fnlla-runtime\VERSION -PathType Leaf)) {
            throw "Published runtime export is missing dist\\fnlla-runtime\\VERSION"
          }

      - name: Audit cross-repository ecosystem contract
        shell: pwsh
        run: .\scripts\audit-fnlla-ecosystem.ps1 -SkipLocalChecks
