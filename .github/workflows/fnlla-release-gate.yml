name: FNLLA Release Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: windows-latest
    env:
      FNLLA_RUNTIME_AUTO_SYNC: false
      FNLLA_RUNTIME_ENFORCE: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql
          coverage: none

      - name: Show PHP version
        shell: pwsh
        run: php -v

      - name: Validate docs sync
        shell: pwsh
        run: php .\scripts\build-docs.php --check

      - name: Validate runtime contract
        shell: pwsh
        run: php .\scripts\validate-fnlla-runtime.php

      - name: Validate version manifest
        shell: pwsh
        run: php .\scripts\validate-version-manifest.php

      - name: Validate release metadata
        shell: pwsh
        run: php .\scripts\validate-release-metadata.php

      - name: Run full test suite
        shell: pwsh
        run: php .\scripts\test.php

      - name: Run syntax lint
        shell: pwsh
        run: php .\scripts\lint.php

      - name: Publish runtime export
        shell: pwsh
        run: .\scripts\publish-fnlla-runtime.ps1

      - name: Audit ecosystem contract
        shell: pwsh
        run: .\scripts\audit-fnlla-ecosystem.ps1 -SkipLocalChecks

      - name: Upload published runtime export
        uses: actions/upload-artifact@v4
        with:
          name: fnlla-runtime-export
          path: dist/fnlla-runtime
          if-no-files-found: error
