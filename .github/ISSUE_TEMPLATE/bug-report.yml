name: Bug report
description: Report framework, CLI, auth, database or UI-contract behavior that is not working correctly.
title: "[Bug]: "
labels:
  - bug
  - testing
body:
  - type: markdown
    attributes:
      value: If this may be a security vulnerability, stop and follow `SECURITY.md` instead of filing a public bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the failure in one or two direct sentences.
      placeholder: The CSRF middleware rejects valid form submissions after the session rotates.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Pick the closest primary surface.
      options:
        - HTTP kernel
        - Routing or middleware
        - Authentication or session flow
        - Database or migrations
        - CLI command surface
        - Views or rendering
        - FNLLA UI contract
        - Release tooling
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime environment
      description: Include PHP version, OS and relevant server context when known.
      placeholder: PHP 8.3, Windows 11, built-in server or Laragon
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the issue.
      placeholder: |
        1. Sign in with a valid seeded account
        2. Open the dashboard form
        3. Submit the form after the session rotates
        4. Observe that the request is rejected with a CSRF error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Valid authenticated requests should keep working after session rotation.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The request fails even though the form token was generated by the current session flow.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and risk
      description: Explain whether this affects release readiness, security trust, downstream apps or only docs polish.
      placeholder: This blocks authenticated form flows and weakens trust in the session lifecycle.
